name: Release

on:
  workflow_dispatch:

jobs:
  merge-develop:
    name: Merge develop into main
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch latest changes
        run: |
          git fetch origin main
          git fetch origin develop

      - name: Checkout main branch
        run: git checkout main

      - name: Merge develop into main
        run: |
          git merge origin/develop --no-edit
        env:
          GIT_MERGE_AUTOEDIT: no

      - name: Push merge to main
        run: git push origin main

  validate-build:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    needs: merge-develop
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Test
        run: pnpm test

      - name: Publish deploy gate status for Vercel
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(git rev-parse HEAD)
          if [ "${{ job.status }}" = "success" ]; then
            STATE=success
          else
            STATE=failure
          fi
          gh api --method POST "repos/${{ github.repository }}/statuses/${SHA}" \
            -f "state=${STATE}" \
            -f context="release/build-validation" \
            -f description="Release workflow: lint, type-check & tests"
